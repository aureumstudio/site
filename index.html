<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Connexion Dashboard</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  background:#ffffff;
  color:#000000;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.container{
  width:100%;
  max-width:420px;
  padding:40px;
  border:1px solid #e5e5e5;
  border-radius:14px;
  background:#ffffff;
}

h1{
  font-size:28px;
  font-weight:700;
  margin-bottom:10px;
}

.subtitle{
  color:#555;
  margin-bottom:28px;
  font-size:15px;
}

input{
  width:100%;
  padding:14px;
  margin-bottom:14px;
  border:1px solid #d9d9d9;
  border-radius:10px;
  font-size:15px;
  outline:none;
  background:#fff;
  color:#000;
}

input:focus{
  border-color:#000;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  background:#000;
  color:#fff;
  font-size:15px;
  font-weight:600;
  cursor:pointer;
  transition:.2s;
}

button:hover{
  opacity:.9;
}

#message{
  margin-top:16px;
  font-size:14px;
  text-align:center;
}
</style>
</head>
<body>

<div class="container">

  <h1>Connexion</h1>

  <p class="subtitle">
    Accédez à votre espace sécurisé
  </p>

  <input
    id="email"
    type="email"
    placeholder="Adresse e-mail"
  >

  <input
    id="password"
    type="password"
    placeholder="Mot de passe"
  >

  <button id="loginBtn">
    Se connecter
  </button>

  <p id="message"></p>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";

import {
  getAuth,
  signInWithEmailAndPassword
}
from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAnPbeuwRSgQkoEK3f1OVlSCkLEWFdafrQ",
  authDomain: "dashboard-8ef0f.firebaseapp.com",
  projectId: "dashboard-8ef0f",
  storageBucket: "dashboard-8ef0f.firebasestorage.app",
  messagingSenderId: "406245674018",
  appId: "1:406245674018:web:7a1fb47cfd8ac70d41ce7b"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

document
.getElementById("loginBtn")
.addEventListener("click", async () => {

  const email =
    document.getElementById("email").value;

  const password =
    document.getElementById("password").value;

  const message =
    document.getElementById("message");

  try {

    await signInWithEmailAndPassword(
      auth,
      email,
      password
    );

    message.innerText =
      "Connexion réussie";
    localStorage.setItem('userUid', auth.currentUser.uid); // Store user UID

    window.location.href =
      "dashboard.html";

  } catch {

    message.innerText =
      "Email ou mot de passe incorrect";

  }

});

</script>

</body>
</html>
